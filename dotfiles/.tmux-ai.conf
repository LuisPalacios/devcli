# =============================================================================
# ~/.tmux-ai.conf
# =============================================================================
# Configuración específica para la sesión "ia" que lanza el script ~/bin/ia.
# Hereda toda la configuración base desde ~/.tmux.conf y sólo personaliza
# lo necesario para que la disposición de paneles y el status bar reflejen
# que estamos en una sesión dedicada a Claude (Opus / Sonnet / Haiku).
#
# Referencias:
# - Proyecto padre - https://github.com/LuisPalacios/devcli
# =============================================================================

# Heredar la configuración base (atajos, colores, status, etc.)
# -q: silenciar el error si el archivo no existe
#source-file -q ~/.tmux.conf

# ---------------------------------------------------------------------------
# DISPOSICIÓN DE PANELES
# ---------------------------------------------------------------------------
# El hook session-created heredado de ~/.tmux.conf genera una disposición
# de 3 paneles que no queremos aquí. La sesión "ia" construye sus propios
# paneles desde ~/bin/ia, así que desactivamos el hook global.
set-hook -gu session-created

# ---------------------------------------------------------------------------
# STATUS BAR
# ---------------------------------------------------------------------------
# Etiqueta distintiva en el lado izquierdo: icono de robot + nombre de sesión.
# Se mantiene el comportamiento de resaltado cuando se pulsa PREFIX_KEY.
set-option -g status-left "\
#[fg=colour235,bg=colour208,bold]\
#{?client_prefix,#[fg=colour237 bg=colour221],} 🤖 #S \
#[fg=colour208,bg=black]\
#{?client_prefix,#[fg=colour221 bg=black],}"
